[build]
  base    = ""
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://careeros-production-66af.up.railway.app; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

# Proxy /api/* to your Railway backend — no CORS issues
[[redirects]]
  from   = "/api/*"
  to     = "https://careeros-production-66af.up.railway.app/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/health"
  to     = "https://careeros-production-66af.up.railway.app/health"
  status = 200
  force  = true

# SPA fallback — all routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
